# weaver — Thursday demo topology (flash-sale incident)
#
# This is the AUTHORED source for the Thursday dataset. Unlike topology.yaml
# (the flat HEALTHY exemplar, left untouched), this file describes the same
# e-commerce system PLUS an authored incident (the `incident:` block at the
# bottom). The generator (--topology this file) emits a baseline that goes
# sour at onset.
#
# Realism deltas vs the exemplar (see project/plans/thursday-dataset-realism.md):
#   * off-round window start + duration (no clean wall-clock boundary)
#   * un-round counts: 28 services across 11 uneven subsystems
#   * naming is NOT uniformly <noun>-<suffix>: a codename (kraken), an
#     abbreviation (inv-cache), a cross-cutting tap (analytics-tap), and a
#     team seam (promo-api owned by growth, not the checkout team)
# The incident mechanics, decoys, and the answer key are specced in
# project/plans/thursday-dataset-contract.md and the gitignored ground-truth.

# ---------------------------------------------------------------------------
# Window & cadence. Start is off-boundary on purpose; the generator further
# jitters per-sample timestamps and drops the occasional scrape.
# ---------------------------------------------------------------------------
window:
  start: "2026-06-09T08:13:47Z"
  minutes: 134
  sample_seconds: 30

kind_baselines:
  gateway:   { latency_p50: 8,   latency_p99: 45,  error_rate: 0.002, throughput_rps: 850, saturation: 0.35 }
  api:       { latency_p50: 18,  latency_p99: 90,  error_rate: 0.004, throughput_rps: 320, saturation: 0.40 }
  worker:    { latency_p50: 120, latency_p99: 600, error_rate: 0.006, throughput_rps: 40,  saturation: 0.45 }
  db:        { latency_p50: 4,   latency_p99: 28,  error_rate: 0.001, throughput_rps: 500, saturation: 0.45, pool_used: 12, pool_max: 50 }
  cache:     { latency_p50: 1,   latency_p99: 6,   error_rate: 0.0005,throughput_rps: 900, saturation: 0.30 }
  queue:     { latency_p50: 5,   latency_p99: 30,  error_rate: 0.001, throughput_rps: 60,  saturation: 0.25, queue_depth: 30 }
  external:  { latency_p50: 60,  latency_p99: 240, error_rate: 0.008, throughput_rps: 90,  saturation: 0.20 }

# ---------------------------------------------------------------------------
# Services (28). No status column — health is derived, never stored.
# ---------------------------------------------------------------------------
services:
  # --- edge ---------------------------------------------------------------
  - { id: web-gateway,        name: "Web Gateway",          kind: gateway,  subsystem: edge,         owner_team: platform }

  # --- storefront ---------------------------------------------------------
  - { id: storefront-bff,     name: "Storefront BFF",       kind: api,      subsystem: storefront,   owner_team: storefront }
  - { id: recommendations,    name: "Recommendations",      kind: api,      subsystem: storefront,   owner_team: discovery }

  # --- catalog ------------------------------------------------------------
  - { id: product-api,        name: "Product API",          kind: api,      subsystem: catalog,      owner_team: catalog }
  - { id: search-api,         name: "Search API",           kind: api,      subsystem: catalog,      owner_team: discovery }
  - { id: catalog-db,         name: "Catalog DB",           kind: db,       subsystem: catalog,      owner_team: catalog,
      metrics: { throughput_rps: 700, saturation: 0.50 } }

  # --- identity -----------------------------------------------------------
  - { id: auth-api,           name: "Auth API",             kind: api,      subsystem: identity,     owner_team: identity }
  - { id: session-cache,      name: "Session Cache",        kind: cache,    subsystem: identity,     owner_team: identity }
  - { id: user-db,            name: "User DB",              kind: db,       subsystem: identity,     owner_team: identity }

  # --- cart ---------------------------------------------------------------
  - { id: cart-api,           name: "Cart API",             kind: api,      subsystem: cart,         owner_team: checkout }
  - { id: cart-cache,         name: "Cart Cache",           kind: cache,    subsystem: cart,         owner_team: checkout }

  # --- checkout -----------------------------------------------------------
  - { id: checkout-api,       name: "Checkout API",         kind: api,      subsystem: checkout,     owner_team: checkout }
  - { id: pricing-api,        name: "Pricing API",          kind: api,      subsystem: checkout,     owner_team: checkout }
  # A promo/discount service owned by GROWTH (marketing), not checkout — an
  # org seam. It's the kind of thing a sale hammers; it is NOT the culprit.
  - { id: promo-api,          name: "Promotions API",       kind: api,      subsystem: checkout,     owner_team: growth }

  # --- payments -----------------------------------------------------------
  - { id: payments-api,       name: "Payments API",         kind: api,      subsystem: payments,     owner_team: payments }
  - { id: payments-db,        name: "Payments DB",          kind: db,       subsystem: payments,     owner_team: payments,
      # Money-path DB on a deliberately smaller pool than the default db, as
      # they often run. A config value — nothing here is "unhealthy".
      metrics: { pool_max: 40, pool_used: 14, throughput_rps: 260, saturation: 0.50 } }
  - { id: payment-gateway,    name: "Payment Gateway (ext)",kind: external, subsystem: payments,     owner_team: payments }
  - { id: fraud-check,        name: "Fraud Check",          kind: api,      subsystem: payments,     owner_team: risk }
  # Legacy risk-scoring engine behind fraud-check. A codename, not a noun-suffix.
  - { id: kraken,             name: "Kraken (risk engine)", kind: api,      subsystem: payments,     owner_team: risk }

  # --- orders -------------------------------------------------------------
  - { id: orders-api,         name: "Orders API",           kind: api,      subsystem: orders,       owner_team: orders }
  - { id: orders-db,          name: "Orders DB",            kind: db,       subsystem: orders,       owner_team: orders }
  - { id: order-events,       name: "Order Events",         kind: queue,    subsystem: orders,       owner_team: orders }

  # --- fulfillment --------------------------------------------------------
  - { id: fulfillment-worker, name: "Fulfillment Worker",   kind: worker,   subsystem: fulfillment,  owner_team: fulfillment }
  - { id: inventory-api,      name: "Inventory API",        kind: api,      subsystem: fulfillment,  owner_team: fulfillment }
  - { id: inventory-db,       name: "Inventory DB",         kind: db,       subsystem: fulfillment,  owner_team: fulfillment }
  # Abbreviated name, inconsistent with `inventory-db` next to it.
  - { id: inv-cache,          name: "Inventory Cache",      kind: cache,    subsystem: fulfillment,  owner_team: fulfillment }

  # --- notifications ------------------------------------------------------
  - { id: notifications-worker, name: "Notifications Worker", kind: worker, subsystem: notifications, owner_team: messaging }

  # --- analytics (a side branch tapping the order stream) -----------------
  - { id: analytics-tap,      name: "analytics-tap",        kind: worker,   subsystem: analytics,    owner_team: data }

# ---------------------------------------------------------------------------
# Dependencies (edges). from_service DEPENDS ON to_service. id: "<from>__<to>".
# ---------------------------------------------------------------------------
dependencies:
  - { id: web-gateway__storefront-bff, from_service: web-gateway,   to_service: storefront-bff, kind: sync_http, critical: true }
  - { id: web-gateway__auth-api,       from_service: web-gateway,   to_service: auth-api,       kind: sync_http, critical: true }

  - { id: storefront-bff__product-api,     from_service: storefront-bff, to_service: product-api,     kind: sync_http, critical: true }
  - { id: storefront-bff__search-api,      from_service: storefront-bff, to_service: search-api,      kind: sync_http }
  - { id: storefront-bff__recommendations, from_service: storefront-bff, to_service: recommendations, kind: sync_http }
  - { id: storefront-bff__cart-api,        from_service: storefront-bff, to_service: cart-api,        kind: sync_http, critical: true }
  - { id: storefront-bff__checkout-api,    from_service: storefront-bff, to_service: checkout-api,    kind: sync_http, critical: true }

  - { id: product-api__catalog-db,      from_service: product-api,     to_service: catalog-db, kind: db_query, critical: true }
  - { id: search-api__catalog-db,       from_service: search-api,      to_service: catalog-db, kind: db_query }
  - { id: recommendations__product-api, from_service: recommendations, to_service: product-api, kind: sync_http }
  - { id: recommendations__catalog-db,  from_service: recommendations, to_service: catalog-db,  kind: db_query }

  - { id: auth-api__user-db,         from_service: auth-api, to_service: user-db,       kind: db_query,  critical: true }
  - { id: auth-api__session-cache,   from_service: auth-api, to_service: session-cache, kind: cache_get, critical: true }

  - { id: cart-api__cart-cache,   from_service: cart-api, to_service: cart-cache,  kind: cache_get, critical: true }
  - { id: cart-api__product-api,  from_service: cart-api, to_service: product-api, kind: sync_http }

  - { id: checkout-api__cart-api,     from_service: checkout-api, to_service: cart-api,     kind: sync_http, critical: true }
  - { id: checkout-api__pricing-api,  from_service: checkout-api, to_service: pricing-api,  kind: sync_http, critical: true }
  - { id: checkout-api__promo-api,    from_service: checkout-api, to_service: promo-api,    kind: sync_http }
  - { id: checkout-api__auth-api,     from_service: checkout-api, to_service: auth-api,     kind: sync_http }
  - { id: checkout-api__inventory-api,from_service: checkout-api, to_service: inventory-api,kind: sync_http, critical: true }
  - { id: checkout-api__payments-api, from_service: checkout-api, to_service: payments-api, kind: sync_http, critical: true }
  - { id: checkout-api__orders-api,   from_service: checkout-api, to_service: orders-api,   kind: sync_http, critical: true }

  - { id: pricing-api__catalog-db,    from_service: pricing-api, to_service: catalog-db,    kind: db_query }
  - { id: pricing-api__inventory-api, from_service: pricing-api, to_service: inventory-api, kind: sync_http }
  - { id: promo-api__catalog-db,      from_service: promo-api,   to_service: catalog-db,    kind: db_query }

  # payments (culprit lives at the bottom here: payments-db)
  - { id: payments-api__payments-db,     from_service: payments-api, to_service: payments-db,     kind: db_query,  critical: true }
  - { id: payments-api__payment-gateway, from_service: payments-api, to_service: payment-gateway, kind: sync_http, critical: true }
  - { id: payments-api__fraud-check,     from_service: payments-api, to_service: fraud-check,     kind: sync_http }
  - { id: fraud-check__user-db,          from_service: fraud-check,  to_service: user-db,         kind: db_query }
  - { id: fraud-check__kraken,           from_service: fraud-check,  to_service: kraken,          kind: sync_http }

  - { id: orders-api__orders-db,      from_service: orders-api, to_service: orders-db,    kind: db_query,      critical: true }
  - { id: orders-api__order-events,   from_service: orders-api, to_service: order-events, kind: async_publish, critical: true }
  - { id: orders-api__inventory-api,  from_service: orders-api, to_service: inventory-api,kind: sync_http }

  - { id: fulfillment-worker__order-events,   from_service: fulfillment-worker,   to_service: order-events, kind: async_publish, critical: true }
  - { id: fulfillment-worker__inventory-api,  from_service: fulfillment-worker,   to_service: inventory-api,kind: sync_http }
  - { id: fulfillment-worker__orders-db,      from_service: fulfillment-worker,   to_service: orders-db,    kind: db_query }
  - { id: inventory-api__inventory-db,        from_service: inventory-api,        to_service: inventory-db, kind: db_query, critical: true }
  - { id: inventory-api__inv-cache,           from_service: inventory-api,        to_service: inv-cache,    kind: cache_get }
  - { id: notifications-worker__order-events, from_service: notifications-worker, to_service: order-events, kind: async_publish }
  - { id: analytics-tap__order-events,        from_service: analytics-tap,        to_service: order-events, kind: async_publish }

# ---------------------------------------------------------------------------
# Request types (routes). Consecutive pairs must be existing dependencies.
# The end-user feels the route at its first hop (web-gateway).
# ---------------------------------------------------------------------------
request_types:
  - { id: browse,       name: "Browse products",    weight: 0.30, path: [web-gateway, storefront-bff, product-api, catalog-db] }
  - { id: search,       name: "Search catalog",     weight: 0.18, path: [web-gateway, storefront-bff, search-api, catalog-db] }
  - { id: recommend,    name: "Get recommendations",weight: 0.08, path: [web-gateway, storefront-bff, recommendations, product-api] }
  - { id: view-cart,    name: "View cart",          weight: 0.12, path: [web-gateway, storefront-bff, cart-api, cart-cache] }
  - { id: login,        name: "Log in",             weight: 0.08, path: [web-gateway, auth-api, user-db] }
  # The money path: checkout -> payments -> payments-db.
  - { id: checkout,     name: "Checkout / pay",     weight: 0.12, path: [web-gateway, storefront-bff, checkout-api, payments-api, payments-db] }
  - { id: place-order,  name: "Place order",        weight: 0.08, path: [web-gateway, storefront-bff, checkout-api, orders-api, orders-db] }
  - { id: promo-apply,  name: "Apply promo code",   weight: 0.04, path: [web-gateway, storefront-bff, checkout-api, promo-api, catalog-db] }

# ===========================================================================
# THE INCIDENT (authored). The generator reads this and bends the baseline.
# Read by --incident mode only; healthy topology.yaml has no such block.
#
# Story: a flash sale (external, invisible to telemetry) ~doubles fleet-wide
# traffic at onset. payments-db's 40-connection pool — fine at 1x — saturates,
# so checkout fails. A payments-api deploy (v2.4.1) lands ~2 min before onset
# and looks guilty; it is innocent (copy-only, no DB path change). The data
# narrows to {demand, regression} and cannot pick: resolution needs two facts
# only the operator holds (was there a promo? what did v2.4.1 change?).
# Full answer key: project/private/ground-truth-flash-sale.md
# ===========================================================================
incident:
  name: flash-sale
  onset_minute: 52          # T0, in minutes from window start (default split is 30% = ~40m, safely in clean baseline)

  # Fleet-wide demand surge — the EXTERNAL trigger telemetry can't explain.
  # Multiplies throughput on EVERY service (incl. ones that don't depend on
  # payments — search/browse — which is the tell that it's demand, not a bug).
  surge:
    peak: 2.1
    ramp_min: 6

  # The red herring: a real deploy, coincident with onset, but innocent.
  deploy:
    at_minute: 50
    target: payments-api
    summary: "Deployed payments-api v2.4.1"
    fields: { version: "2.4.1", prev: "2.4.0", change: "checkout copy + button styling", touches_db: false, pr: 4821 }

  # Per-service effects, applied at onset+lag_min (ramped over ~3 min, then
  # sustained to the window end — no recovery; the incident is ongoing).
  #   role: culprit  -> where it manifests (pool exhaustion)
  #         cascade  -> downstream collateral on the money path
  #         collateral -> genuinely-moves decoys NOT on the payments path
  effects:
    payments-db:    { lag_min: 3,  role: culprit,    lat_p99_mult: 4.0, err_add: 0.16, sat_to: 0.93, pool_to: 39, pool_wait_ms: 2100 }
    payments-api:   { lag_min: 6,  role: cascade,    lat_p99_mult: 2.4, err_add: 0.13 }
    checkout-api:   { lag_min: 8,  role: cascade,    lat_p99_mult: 1.7, err_add: 0.10 }
    web-gateway:    { lag_min: 11, role: cascade,    lat_p99_mult: 1.3, err_add: 0.05 }
    recommendations: { lag_min: 4,  role: collateral, lat_p99_mult: 1.6, err_add: 0.0 }
    search-api:     { lag_min: 5,  role: collateral, lat_p99_mult: 1.5, err_add: 0.0 }

  # recommendations also carries a slow intrinsic drift across the WHOLE window
  # (incident or not) — the one "always at least one noisy/drifting thing" the
  # reviewer wanted. It's off the payments path, so it stays a decoy.
  drifters:
    - { service: recommendations, metric: latency_p99, drift_pct: 22 }

  # Ambient change events — routine deploys/flags/config across the window, so
  # "find a deploy near the incident" returns more than one hit (the lone
  # marker would itself be a tell). None of these are causal.
  ambient_changes:
    - { at_minute: 9,   kind: deploy,       target: search-api,           summary: "Deployed search-api v5.7.0" }
    - { at_minute: 24,  kind: feature_flag, target: recommendations,      summary: "Enabled flag recs_v2_ranking" }
    - { at_minute: 78,  kind: config,       target: catalog-db,           summary: "Raised catalog-db statement_timeout 2s to 5s" }
    - { at_minute: 103, kind: deploy,       target: notifications-worker, summary: "Deployed notifications-worker v1.9.3" }
